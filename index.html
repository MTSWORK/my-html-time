<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html,body{
margin:0;
padding:0;
background:#ffffff;
font-family:Arial, sans-serif;
width:100%;
}

.container{
width:100%;
text-align:center;
padding:10px 0;
}

.date{
font-size:28px;
color:#000;
margin-bottom:5px;
}

.clock{
font-size:64px;
font-weight:bold;
color:#000;
letter-spacing:2px;
margin-bottom:10px;
}

.progress-container{
width:95%;
height:10px;
background:#e5e5e5;
margin:auto;
border-radius:10px;
overflow:hidden;
}

.progress{
height:100%;
background:#000;
width:0%;
}

.percent{
font-size:14px;
margin-top:4px;
color:#444;
}

</style>
</head>

<body>

<div class="container">

<div class="date" id="date"></div>

<div class="clock" id="clock"></div>

<div class="progress-container">
<div class="progress" id="progress"></div>
</div>

<div class="percent" id="percent"></div>

</div>

<script>

function update(){

const now = new Date()

const week=["일","월","화","수","목","금","토"]

const y=now.getFullYear()
const m=String(now.getMonth()+1).padStart(2,'0')
const d=String(now.getDate()).padStart(2,'0')
const w=week[now.getDay()]

document.getElementById("date").innerText=`${y}.${m}.${d} (${w})`

const h=String(now.getHours()).padStart(2,'0')
const min=String(now.getMinutes()).padStart(2,'0')
const s=String(now.getSeconds()).padStart(2,'0')

document.getElementById("clock").innerText=`${h}:${min}:${s}`

const seconds=
now.getHours()*3600+
now.getMinutes()*60+
now.getSeconds()

const percent=(seconds/86400)*100

document.getElementById("progress").style.width=percent+"%"

document.getElementById("percent").innerText=
"오늘 진행률 "+percent.toFixed(2)+"%"

}

setInterval(update,1000)
update()

</script>

</body>
</html>
